services:
  dashboard:
    build:
      context: .
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - ./server:/app/server
      - ./tsconfig.json:/app/tsconfig.json
      - ./src:/app/src
      - ./content:/app/content
    environment:
      - CHOKIDAR_USEPOLLING=true
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY:-}
