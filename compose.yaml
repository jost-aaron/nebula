services:
  dashboard:
    build:
      context: .
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - ./server:/app/server
      - ./tests:/app/tests
      - ./tsconfig.json:/app/tsconfig.json
      - ./src:/app/src
      - ./content:/app/content
      - nebula-data:/app/data
    environment:
      - CHOKIDAR_USEPOLLING=true
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY:-}
      - TMDB_API_TOKEN=${TMDB_API_TOKEN:-}
      - NEBULA_REQUIRE_AUTH=${NEBULA_REQUIRE_AUTH:-false}
      - NEBULA_API_TOKEN=${NEBULA_API_TOKEN:-}
      - NEBULA_AUTH_ALLOW_LOCALHOST=${NEBULA_AUTH_ALLOW_LOCALHOST:-true}
      - NEBULA_CORS_ALLOWED_ORIGINS=${NEBULA_CORS_ALLOWED_ORIGINS:-}
      - NEBULA_DATA_ROOT=/app/data
volumes:
  nebula-data:
