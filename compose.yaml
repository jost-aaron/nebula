services:
  dashboard:
    build:
      context: .
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - ./server:/app/server
      - ./tests:/app/tests
      - ./tsconfig.json:/app/tsconfig.json
      - ./src:/app/src
      - ./content:/app/content
      - nebula-data:/app/data
      - tailscale-control:/run/nebula-tailscale
    environment:
      - CHOKIDAR_USEPOLLING=true
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY:-}
      - TMDB_API_TOKEN=${TMDB_API_TOKEN:-}
      - NEBULA_REQUIRE_AUTH=${NEBULA_REQUIRE_AUTH:-false}
      - NEBULA_API_TOKEN=${NEBULA_API_TOKEN:-}
      - NEBULA_AUTH_ALLOW_LOCALHOST=${NEBULA_AUTH_ALLOW_LOCALHOST:-true}
      - NEBULA_FIRST_RUN_GUEST_ENABLED=${NEBULA_FIRST_RUN_GUEST_ENABLED:-true}
      - NEBULA_GUEST_SESSION_TTL_MS=${NEBULA_GUEST_SESSION_TTL_MS:-28800000}
      - NEBULA_CORS_ALLOWED_ORIGINS=${NEBULA_CORS_ALLOWED_ORIGINS:-}
      - NEBULA_DATA_ROOT=/app/data
      - NEBULA_TRANSCODE_ACCELERATION=${NEBULA_TRANSCODE_ACCELERATION:-software-only}
      - NEBULA_TAILSCALE_UI_ENABLED=true
      - NEBULA_TAILSCALE_CONTROL_PATH=/run/nebula-tailscale
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  tailscale:
    image: tailscale/tailscale@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/config/containerboot-enrollment.sh"]
    network_mode: "service:dashboard"
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      TS_AUTH_ONCE: "true"
      TS_AUTHKEY: "file:/run/secrets/tailscale_authkey"
      TS_HOSTNAME: "${NEBULA_TAILSCALE_HOSTNAME:-nebula}"
      TS_KUBE_SECRET: ""
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_ENABLE_HEALTH_CHECK: "true"
      TS_LOCAL_ADDR_PORT: "127.0.0.1:9002"
      NEBULA_DASHBOARD_GID: "0"
      NEBULA_TAILSCALE_CONTROL_DIR: /var/run/nebula-tailscale
    secrets:
      - tailscale_authkey
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./deploy/tailscale:/config:ro
      - tailscale-control:/var/run/nebula-tailscale

secrets:
  tailscale_authkey:
    file: /dev/null
volumes:
  nebula-data:
  tailscale-control:
  tailscale-state:
