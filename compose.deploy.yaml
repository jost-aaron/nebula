# Single-host self-hosted preview. Build locally; no published image is implied.
services:
  dashboard:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: "${NEBULA_UID:-1000}:${NEBULA_GID:-1000}"
    ports:
      - "${NEBULA_BIND_ADDRESS:-127.0.0.1}:${NEBULA_PORT:-5173}:5173"
    volumes:
      - type: bind
        source: ${NEBULA_CONTENT_PATH:?set NEBULA_CONTENT_PATH}
        target: /app/content
      - type: bind
        source: ${NEBULA_DATA_PATH:?set NEBULA_DATA_PATH}
        target: /app/data
      - type: bind
        source: ${NEBULA_BACKUP_PATH:?set NEBULA_BACKUP_PATH}
        target: /app/backups
    environment:
      HOST: 0.0.0.0
      PORT: "5173"
      NEBULA_DATA_ROOT: /app/data
      NEBULA_BACKUP_ROOT: /app/backups
      NEBULA_RESTORE_STAGING_ROOT: /app/data/restore-staging
      NEBULA_REQUIRE_AUTH: "${NEBULA_REQUIRE_AUTH:-false}"
      NEBULA_API_TOKEN: "${NEBULA_API_TOKEN:-}"
      NEBULA_AUTH_ALLOW_LOCALHOST: "${NEBULA_AUTH_ALLOW_LOCALHOST:-false}"
      NEBULA_FIRST_RUN_GUEST_ENABLED: "${NEBULA_FIRST_RUN_GUEST_ENABLED:-false}"
      NEBULA_GUEST_SESSION_TTL_MS: "${NEBULA_GUEST_SESSION_TTL_MS:-28800000}"
      NEBULA_CORS_ALLOWED_ORIGINS: "${NEBULA_CORS_ALLOWED_ORIGINS:-}"
      NEBULA_VITE_ALLOWED_HOSTS: "${NEBULA_VITE_ALLOWED_HOSTS:-}"
      NEBULA_AUDIT_RETENTION_DAYS: "${NEBULA_AUDIT_RETENTION_DAYS:-90}"
      NEBULA_AUDIT_MAX_EVENTS: "${NEBULA_AUDIT_MAX_EVENTS:-10000}"
      TMDB_API_TOKEN: "${TMDB_API_TOKEN:-}"
      GOOGLE_VISION_API_KEY: "${GOOGLE_VISION_API_KEY:-}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 45s
