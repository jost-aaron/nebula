# Single-host self-hosted preview. Build locally; no published image is implied.
services:
  dashboard:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: "${NEBULA_UID:-1000}:${NEBULA_GID:-1000}"
    ports:
      - "${NEBULA_BIND_ADDRESS:-127.0.0.1}:${NEBULA_PORT:-5173}:5173"
    volumes:
      - type: bind
        source: ${NEBULA_CONTENT_PATH:?set NEBULA_CONTENT_PATH}
        target: /app/content
      - type: bind
        source: ${NEBULA_DATA_PATH:?set NEBULA_DATA_PATH}
        target: /app/data
      - type: bind
        source: ${NEBULA_BACKUP_PATH:?set NEBULA_BACKUP_PATH}
        target: /app/backups
      - type: volume
        source: tailscale-enrollment
        target: /run/nebula-tailscale
    environment:
      HOST: 0.0.0.0
      PORT: "5173"
      NEBULA_DATA_ROOT: /app/data
      NEBULA_BACKUP_ROOT: /app/backups
      NEBULA_RESTORE_STAGING_ROOT: /app/data/restore-staging
      NEBULA_REQUIRE_AUTH: "${NEBULA_REQUIRE_AUTH:-false}"
      NEBULA_API_TOKEN: "${NEBULA_API_TOKEN:-}"
      NEBULA_AUTH_ALLOW_LOCALHOST: "${NEBULA_AUTH_ALLOW_LOCALHOST:-false}"
      NEBULA_FIRST_RUN_GUEST_ENABLED: "${NEBULA_FIRST_RUN_GUEST_ENABLED:-false}"
      NEBULA_GUEST_SESSION_TTL_MS: "${NEBULA_GUEST_SESSION_TTL_MS:-28800000}"
      NEBULA_CORS_ALLOWED_ORIGINS: "${NEBULA_CORS_ALLOWED_ORIGINS:-}"
      NEBULA_VITE_ALLOWED_HOSTS: "${NEBULA_VITE_ALLOWED_HOSTS:-}"
      NEBULA_VITE_HMR: "${NEBULA_VITE_HMR:-false}"
      NEBULA_EXTERNAL_HTTPS: "${NEBULA_EXTERNAL_HTTPS:-false}"
      NEBULA_TAILSCALE_UI_ENABLED: "true"
      NEBULA_TAILSCALE_FQDN: "${NEBULA_TAILSCALE_FQDN:-}"
      NEBULA_TAILSCALE_CONTROL_PATH: /run/nebula-tailscale
      NEBULA_AUDIT_RETENTION_DAYS: "${NEBULA_AUDIT_RETENTION_DAYS:-90}"
      NEBULA_AUDIT_MAX_EVENTS: "${NEBULA_AUDIT_MAX_EVENTS:-10000}"
      NEBULA_TRANSCODE_ACCELERATION: "${NEBULA_TRANSCODE_ACCELERATION:-software-only}"
      TMDB_API_TOKEN: "${TMDB_API_TOKEN:-}"
      GOOGLE_VISION_API_KEY: "${GOOGLE_VISION_API_KEY:-}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 45s

  tailscale:
    image: tailscale/tailscale@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/config/containerboot-enrollment.sh"]
    network_mode: "service:dashboard"
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      TS_AUTH_ONCE: "true"
      TS_AUTHKEY: "file:/run/secrets/tailscale_authkey"
      TS_HOSTNAME: "${NEBULA_TAILSCALE_HOSTNAME:-nebula}"
      TS_KUBE_SECRET: ""
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_ENABLE_HEALTH_CHECK: "true"
      TS_LOCAL_ADDR_PORT: "127.0.0.1:9002"
      NEBULA_DASHBOARD_GID: "${NEBULA_GID:-1000}"
      NEBULA_TAILSCALE_CONTROL_DIR: /var/run/nebula-tailscale
    secrets:
      - tailscale_authkey
    volumes:
      - type: bind
        source: ${NEBULA_TAILSCALE_STATE_PATH:-/srv/nebula/tailscale/state}
        target: /var/lib/tailscale
      - type: bind
        source: ./deploy/tailscale
        target: /config
        read_only: true
      - type: volume
        source: tailscale-enrollment
        target: /var/run/nebula-tailscale

secrets:
  tailscale_authkey:
    file: ${NEBULA_TAILSCALE_AUTHKEY_FILE:-/dev/null}

volumes:
  tailscale-enrollment:
